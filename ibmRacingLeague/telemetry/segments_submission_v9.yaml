# Derived from v8 (Run 032 DNF — two off-tracks).
#
# Run 032 failure modes:
#   1. Off-track entering the s08 kink (elevation change at ~1950m).
#      v8 had pushed s07 85->87 and held s08a at 102 — the elevation +
#      faster carry into the kink exceeded line tolerance.
#   2. Off-track on the last major corner (s13 hairpin).
#      v8 had pushed s12 90->95, bringing s13 entry 5 km/h higher than
#      v7 — and s13 was already peak |trackPos| 0.87 on Run 031. No
#      margin left; went off.
#
# Deltas vs v8 (rollbacks in the two failure zones; rest of v8 held):
#   s07  L  87 -> 85    (roll back to v7 — pre-s08 corner)
#   s08a     102 -> 98  (conservative approach to kink + elevation)
#   s12      95 -> 90   (roll back to v7 — reduce s13 entry speed)
#   s13  L   62 -> 60   (extra margin on tight hairpin)
#   s14      105 -> 100 (roll back — reduce s15 approach speed)
#
# Held from v8:
#   s08c racing line exit_pos -0.45 (the v8 safety fix stays)
#   straights still capped: s02 103, s04 103, s06 110, s10 108
#   corners with margin: s01 84, s03 85, s05 87, s09 60, s11 87
#   s08b (kink itself at 100), s08c (102), s15 (78)
#
# Risk: conservative on the two problem zones. If Run 033 is clean but
# loses time vs Run 031's 156.586, the fix is surgical: push s08a first
# (98 -> 100), then s12 (90 -> 92), never together.
#
# Estimated: Run 031 class (156-157s) but CLEAN. Then iterate.
#
# Schema version: v1

