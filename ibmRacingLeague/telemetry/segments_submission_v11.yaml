# Corkscrew segment map — SUBMISSION CONFIG v11 (2026-04-24)
# Derived from v10 (Run 034 — 145.026s "finish" but 18 damages, NOT
# submission-clean. Two excursions cut + scraped walls).
#
# Run 034 failures:
#   1. s08c at 1950-1976m: peak trackPos -1.23 (unchanged kink problem)
#   2. s09 apex at 2489-2528m: peak trackPos +2.60 — car CUT the inside
#      of the R hairpin. That shortcut is what produced the "145s" time
#      and 18 damages. Not a valid lap.
#
# Diagnosis: s09 apex_pos +0.55 + speed 60 km/h + racing-line gain let
# the car ride the inside edge, peak steer 1.0 (lock), and overshoot
# inside. Fix is twofold: lower speed AND pull apex off the inside.
#
# Deltas vs v10 (surgical fix on s09 + s08c; s13 region kept from v10):
#   s09 speed        60 -> 56        (back off apex push)
#   s09 apex_pos   +0.55 -> +0.40    (pull apex in so overshoot stays on track)
#   s08c exit_pos  -0.45 -> -0.35    (keep car off left edge at kink exit)
#
# Held from v10:
#   s12 82, s13 52 / apex -0.40 / exit +0.15, s14 95 (all the s13 rollback)
#   s07 85, s08a 98, s08b 100, s08c 102 (speed)
#   straights capped: s02 103, s04 103, s06 110, s10 108
#   corners: s01 84, s03 85, s05 87, s11 87
#   s15 78
#
# Risk: v10 already proved s13 safe at 52 with inside-apex fix. v11
# applies the SAME pattern to s09 (lower speed + inside-apex). Expect
# clean finish with most v10 gains retained.
#
# Estimated: ~150-155s CLEAN. Run 031's 156.586s remains the submission
# anchor until v11 posts a damages=0 lap.
#
